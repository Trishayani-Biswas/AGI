[NEAT]
fitness_criterion     = max
fitness_threshold     = 5000.0
pop_size              = 42
reset_on_extinction   = False
no_fitness_termination = False

[DefaultGenome]
activation_default      = tanh
activation_mutate_rate  = 0.08
activation_options      = tanh relu sigmoid

aggregation_default     = sum
aggregation_mutate_rate = 0.0
aggregation_options     = sum

bias_init_mean          = 0.0
bias_init_stdev         = 1.0
bias_max_value          = 30.0
bias_min_value          = -30.0
bias_mutate_power       = 0.45
bias_mutate_rate        = 0.72
bias_replace_rate       = 0.1

compatibility_disjoint_coefficient = 1.0
compatibility_weight_coefficient   = 0.55

conn_add_prob           = 0.34
conn_delete_prob        = 0.18

enabled_default         = True
enabled_mutate_rate     = 0.04

feed_forward            = True
initial_connection      = full_direct

node_add_prob           = 0.2
node_delete_prob        = 0.08

num_hidden              = 0
num_inputs              = 25
num_outputs             = 9

response_init_mean      = 1.0
response_init_stdev     = 0.0
response_max_value      = 30.0
response_min_value      = -30.0
response_mutate_power   = 0.2
response_mutate_rate    = 0.06
response_replace_rate   = 0.0

weight_init_mean        = 0.0
weight_init_stdev       = 1.5
weight_max_value        = 30
weight_min_value        = -30
weight_mutate_power     = 0.55
weight_mutate_rate      = 0.82
weight_replace_rate     = 0.12

[DefaultSpeciesSet]
compatibility_threshold = 2.8

[DefaultStagnation]
species_fitness_func = max
max_stagnation       = 14
species_elitism      = 2

[DefaultReproduction]
elitism            = 2
survival_threshold = 0.25
